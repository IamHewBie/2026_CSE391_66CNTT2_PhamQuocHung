<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bảng Điểm Sinh Viên</title>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        input {
            padding: 5px;
            margin-right: 10px;
        }

        button {
            padding: 6px 12px;
        }

        table {
            border-collapse: collapse;
            width: 600px;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f2f2f2;
        }

        .yeu {
            background: yellow;
        }

        .stats {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <h2>Quản lý điểm sinh viên</h2>

    <input id="name" placeholder="Họ tên">
    <input id="score" placeholder="Điểm (0-10)">
    <button id="addBtn">Thêm</button>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>

        <tbody id="tableBody">

        </tbody>
    </table>

    <div class="stats">
        Tổng SV: <span id="total">0</span> |
        Điểm trung bình: <span id="avg">0</span>
    </div>

    <script>

        const nameInput = document.getElementById("name")
        const scoreInput = document.getElementById("score")
        const addBtn = document.getElementById("addBtn")
        const tbody = document.getElementById("tableBody")

        let students = []

        function getRank(score) {

            if (score >= 8.5) return "Giỏi"
            if (score >= 7) return "Khá"
            if (score >= 5) return "Trung bình"
            return "Yếu"

        }

        function renderTable() {

            tbody.innerHTML = ""

            students.forEach((sv, index) => {

                const tr = document.createElement("tr")

                if (sv.score < 5) {
                    tr.classList.add("yeu")
                }

                tr.innerHTML = `
        <td>${index + 1}</td>
        <td>${sv.name}</td>
        <td>${sv.score}</td>
        <td>${getRank(sv.score)}</td>
        <td>
        <button data-index="${index}">Xóa</button>
        </td>
        `

                tbody.appendChild(tr)

            })

            updateStats()

        }

        function updateStats() {

            const total = students.length

            let avg = 0

            if (total > 0) {

                const sum = students.reduce((s, sv) => s + sv.score, 0)

                avg = (sum / total).toFixed(2)

            }

            document.getElementById("total").textContent = total
            document.getElementById("avg").textContent = avg

        }

        function addStudent() {

            const name = nameInput.value.trim()
            const score = Number(scoreInput.value)

            if (name === "") {
                alert("Họ tên không được để trống")
                return
            }

            if (isNaN(score) || score < 0 || score > 10) {
                alert("Điểm phải từ 0 đến 10")
                return
            }

            students.push({
                name: name,
                score: score
            })

            renderTable()

            nameInput.value = ""
            scoreInput.value = ""

            nameInput.focus()

        }

        addBtn.addEventListener("click", addStudent)

        scoreInput.addEventListener("keyup", (e) => {
            if (e.key === "Enter") {
                addStudent()
            }
        })

        tbody.addEventListener("click", (e) => {

            if (e.target.tagName === "BUTTON") {

                const index = e.target.getAttribute("data-index")

                students.splice(index, 1)

                renderTable()

            }

        })

    </script>

</body>

</html>
