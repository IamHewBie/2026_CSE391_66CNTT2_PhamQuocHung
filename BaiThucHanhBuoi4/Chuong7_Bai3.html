<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Await + Fetch API</title>
    <style>
        body {
            font-family: Arial;
        }
        #users {
            margin-top: 20px;
        }
        .user {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <h2>Danh sách người dùng</h2>
    <button id="loadBtn">Tải dữ liệu</button>
    <div id="users"></div>
    <script>
        // 1 + 2 + 3 + 4 + 5
        async function loadUsers() {
            const container = document.getElementById("users");
            try {
                // 2. Fetch API gọi API công khai
                const response = await fetch("https://jsonplaceholder.typicode.com/users");
                // kiểm tra lỗi kết nối
                if (!response.ok) {
                    throw new Error("Lỗi kết nối API");
                }
                // 4. chuyển dữ liệu sang JSON
                const users = await response.json();
                console.log(users);
                // 5. hiển thị dữ liệu lên DOM
                container.innerHTML = "";
                users.forEach(user => {
                    const div = document.createElement("div");
                    div.classList.add("user");
                    div.innerHTML = `
                <h3>${user.name}</h3>
                <p>Email: ${user.email}</p>
                <p>City: ${user.address.city}</p>
            `;
                    container.appendChild(div);
                });

            }
            catch (error) {
                console.error("Có lỗi:", error);
                container.innerHTML = "<p>Không thể tải dữ liệu</p>";
            }
        }
        // click để load dữ liệu
        document
            .getElementById("loadBtn")
            .addEventListener("click", loadUsers);
    </script>
</body>

</html>
